<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MTGA+ - Game Modes</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #c8c8d8;
            min-height: 100vh;
            padding-top: 56px;
        }
        a { color: #e94560; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Nav (shared style) */
        .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 56px; background: rgba(22,33,62,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(233,69,96,0.15); }
        .nav-left { display: flex; align-items: center; gap: 28px; }
        .nav-logo { font-size: 1.3rem; font-weight: 800; color: #e94560; letter-spacing: 1px; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #888; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .nav-links a:hover { color: #e0e0e0; text-decoration: none; }
        .nav-links a.active { color: #e94560; }
        .env-tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 3px; background: #ffa726; color: #000; font-weight: 700; text-transform: uppercase; }

        .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
        h1 { color: #fff; margin-bottom: 4px; font-size: 1.8rem; }
        .subtitle { color: #777; font-size: 0.95rem; margin-bottom: 24px; }

        /* Password gate */
        .gate { max-width: 480px; margin: 80px auto; padding: 32px; background: #16213e; border: 1px solid #0f3460; border-radius: 12px; text-align: center; }
        .gate h2 { color: #fff; margin-bottom: 12px; }
        .gate p { color: #888; margin-bottom: 20px; font-size: 0.95rem; }
        .gate input { width: 100%; padding: 12px; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #c8c8d8; font-size: 1rem; outline: none; margin-bottom: 12px; }
        .gate input:focus { border-color: #e94560; }
        .gate button { padding: 10px 28px; background: #e94560; color: #fff; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; }
        .gate button:hover { background: #d63851; }
        .gate .err { color: #e94560; font-size: 0.85rem; margin-top: 8px; min-height: 1em; }

        /* Layout */
        .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 12px; flex-wrap: wrap; }
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-primary:hover { background: #d63851; }
        .btn-secondary { background: #0f3460; color: #c8c8d8; }
        .btn-secondary:hover { background: #1a4a8a; }
        .btn-danger { background: #5a1a1a; color: #ffb8b8; }
        .btn-danger:hover { background: #7a2a2a; }

        /* Mode list */
        .mode-list { display: grid; gap: 10px; margin-bottom: 32px; }
        .mode-card { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: #16213e; border: 1px solid #0f3460; border-radius: 8px; }
        .mode-card-info h3 { color: #fff; font-size: 1.05rem; margin-bottom: 4px; }
        .mode-card-info .meta { font-size: 0.8rem; color: #888; }
        .mode-card-info .meta span { color: #4db8ff; }
        .mode-card-actions { display: flex; gap: 6px; }

        /* Form */
        .form-card { padding: 24px; background: #16213e; border: 1px solid #0f3460; border-radius: 12px; margin-bottom: 24px; }
        .form-card h2 { color: #fff; margin-bottom: 16px; font-size: 1.3rem; }
        .form-row { display: grid; grid-template-columns: 200px 1fr; gap: 12px; align-items: start; margin-bottom: 14px; }
        .form-row > label { font-size: 0.9rem; color: #c8c8d8; padding-top: 8px; }
        .form-row > .help { color: #666; font-size: 0.78rem; margin-top: 4px; }
        .form-row input[type="text"], .form-row textarea, .form-row select { width: 100%; padding: 8px 10px; border: 1px solid #0f3460; border-radius: 4px; background: #1a1a2e; color: #c8c8d8; font-size: 0.9rem; outline: none; font-family: inherit; }
        .form-row textarea { min-height: 70px; resize: vertical; font-family: 'Cascadia Code', Consolas, monospace; }
        .form-row input[type="text"]:focus, .form-row textarea:focus, .form-row select:focus { border-color: #e94560; }
        .form-row .checkbox { display: flex; align-items: center; gap: 8px; }
        .form-row .checkbox input { width: auto; margin-top: 4px; }

        /* Tabs (legality source) */
        .tabs { display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 1px solid #0f3460; }
        .tab { padding: 8px 16px; border: 1px solid #0f3460; border-bottom: none; border-radius: 4px 4px 0 0; background: #1a1a2e; color: #888; cursor: pointer; font-size: 0.85rem; }
        .tab.active { background: #16213e; color: #e94560; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        /* Multi-select chips */
        .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
        .chip { padding: 4px 10px; border: 1px solid #0f3460; border-radius: 14px; background: transparent; color: #888; font-size: 0.78rem; cursor: pointer; }
        .chip.selected { background: #e94560; border-color: #e94560; color: #fff; }
        .chip:hover { border-color: #e94560; }

        .set-search { width: 240px; }
        .set-list { max-height: 260px; overflow-y: auto; padding: 8px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 4px; margin-top: 8px; }
        .set-toggle { display: inline-block; margin: 2px; padding: 4px 8px; border: 1px solid #0f3460; border-radius: 4px; background: transparent; color: #888; cursor: pointer; font-size: 0.75rem; }
        .set-toggle.selected { background: #e94560; color: #fff; border-color: #e94560; }
        .actions { display: flex; gap: 8px; margin-top: 16px; }

        /* Post-processing builder */
        .pp-section { background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; padding: 12px; margin-bottom: 12px; }
        .pp-section h4 { color: #fff; font-size: 0.95rem; margin-bottom: 8px; }
        .pp-row { display: grid; grid-template-columns: 100px 100px 100px 1fr; gap: 8px; align-items: center; margin-bottom: 6px; }
        .pp-row input[type="number"] { width: 80px; padding: 6px; border: 1px solid #0f3460; border-radius: 4px; background: #14142a; color: #c8c8d8; font-size: 0.85rem; }
        .pp-row select { padding: 6px; border: 1px solid #0f3460; border-radius: 4px; background: #14142a; color: #c8c8d8; font-size: 0.85rem; }

        .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 18px; border-radius: 6px; color: #fff; z-index: 200; }
        .toast.success { background: #2e7d32; }
        .toast.error { background: #b71c1c; }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .pp-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-left">
        <a href="/" class="nav-logo">MTGA+</a>
        <div class="nav-links">
            <a href="/lobbies">Lobbies</a>
            <a href="/gamemodes" class="active">Game Modes</a>
            <a href="https://github.com/MayerDaniel/MTGA-Enhancement-Suite" target="_blank">GitHub</a>
        </div>
    </div>
    <div id="envTagWrap"></div>
</nav>

<!-- Password gate -->
<div class="gate" id="gateView">
    <h2>Game Mode Editor</h2>
    <p>Authenticated game mode authors only. Enter the shared password to continue.</p>
    <input type="password" id="passwordInput" placeholder="Password" autofocus>
    <button onclick="checkPassword()">Unlock</button>
    <div class="err" id="gateErr"></div>
</div>

<!-- Editor (hidden until unlocked) -->
<div class="container" id="editorView" style="display:none;">
    <h1>Game Modes <span id="envBadge"></span></h1>
    <p class="subtitle">Define the formats players can pick from in the lobby. Saved modes appear in everyone's MTGA+ dropdown.</p>

    <div class="top-row">
        <button class="btn btn-primary" onclick="newMode()">+ New Mode</button>
        <button class="btn btn-secondary" onclick="reloadModes()">Refresh</button>
    </div>

    <div id="modeList" class="mode-list"></div>

    <div id="formView" style="display:none;"></div>
</div>

<div id="toastContainer"></div>

<script>
    // ===== Configuration =====
    var FUNCTIONS_URL = 'https://us-central1-mtga-enhancement-suite.cloudfunctions.net';
    // SHA-256 of the gamemode editor password ("TrustedGameModeCre@t0r!").
    // Anyone with the password can author modes — community trust model.
    var EXPECTED_HASH = '9f8d4ba22f518157fc671d9ba48c71b0afadd0d94ddd6f51ed7e0bd51fda240d';
    var ENV = (new URLSearchParams(window.location.search)).get('env') === 'staging' ? 'staging' : 'prod';

    // Match types from MTGA's ChallengeMatchTypes enum
    var MATCH_TYPES = [
        { value: 'DirectGame', label: 'Direct Game (60 card constructed)' },
        { value: 'DirectGameAlchemy', label: 'Direct Game Alchemy (60 card rebalanced)' },
        { value: 'DirectGameBrawl', label: 'Direct Game Brawl' },
        { value: 'DirectGameLimited', label: 'Direct Game Limited' },
        { value: 'DirectGameTournamentMode', label: 'Tournament Mode' },
        { value: 'DirectGameTournamentLimited', label: 'Tournament Limited' },
        { value: 'DirectGameTournamentHistoric', label: 'Tournament Historic' },
        { value: 'DirectGameTournamentAlchemy', label: 'Tournament Alchemy' },
        { value: 'DirectGameTournamentExplorer', label: 'Tournament Explorer' },
        { value: 'DirectGameTournamentTimeless', label: 'Tournament Timeless' },
    ];
    var ALL_RARITIES = ['basic', 'common', 'uncommon', 'rare', 'mythic'];

    var authHash = null;
    var modesCache = {};       // id -> mode
    var setsCache = [];        // [{ code, count }]
    var setSearchTerm = '';

    // ===== Init =====
    document.addEventListener('DOMContentLoaded', function() {
        if (ENV === 'staging') {
            document.getElementById('envTagWrap').innerHTML = '<span class="env-tag">Staging</span>';
            document.getElementById('envBadge').innerHTML = ' <span class="env-tag">Staging</span>';
        }
        // Auto-unlock if hash already saved
        var saved = localStorage.getItem('mtgaes_gamemode_auth');
        if (saved === EXPECTED_HASH) {
            authHash = saved;
            showEditor();
        }
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });
    });

    // ===== Password gate =====
    async function sha256(text) {
        var buf = new TextEncoder().encode(text);
        var hash = await crypto.subtle.digest('SHA-256', buf);
        return Array.from(new Uint8Array(hash))
            .map(function(b) { return b.toString(16).padStart(2, '0'); })
            .join('');
    }

    async function checkPassword() {
        var pw = document.getElementById('passwordInput').value;
        var err = document.getElementById('gateErr');
        err.textContent = '';
        if (!pw) { err.textContent = 'Password required'; return; }
        var hash = await sha256(pw);
        if (hash !== EXPECTED_HASH) {
            err.textContent = 'Incorrect password';
            return;
        }
        authHash = hash;
        localStorage.setItem('mtgaes_gamemode_auth', hash);
        showEditor();
    }

    function showEditor() {
        document.getElementById('gateView').style.display = 'none';
        document.getElementById('editorView').style.display = 'block';
        loadCardMetadata().then(reloadModes);
    }

    // ===== Data loading =====
    async function loadCardMetadata() {
        try {
            var res = await fetch(`${FUNCTIONS_URL}/listCardSets?env=${ENV}`);
            var data = await res.json();
            setsCache = (data && data.sets) || [];
        } catch (err) {
            console.warn('Could not load card metadata sets:', err);
            setsCache = [];
        }
    }

    async function reloadModes() {
        try {
            var res = await fetch(`${FUNCTIONS_URL}/listGameModes?env=${ENV}`);
            var data = await res.json();
            modesCache = data.modes || {};
            renderModeList();
        } catch (err) {
            toast('Failed to load game modes: ' + err.message, true);
        }
    }

    function renderModeList() {
        var list = document.getElementById('modeList');
        var ids = Object.keys(modesCache).sort();
        if (ids.length === 0) {
            list.innerHTML = '<div class="mode-card"><div class="mode-card-info"><h3>No modes defined</h3><div class="meta">Click "+ New Mode" to create one.</div></div></div>';
            return;
        }
        list.innerHTML = ids.map(function(id) {
            var m = modesCache[id];
            var bestOf = m.isBestOf3Default ? 'Bo3' : 'Bo1';
            var src = m.legalitySource ? m.legalitySource.type : '?';
            return `<div class="mode-card">
                <div class="mode-card-info">
                    <h3>${escape(m.displayName)} <span style="color:#666;font-size:0.85rem">(${escape(id)})</span></h3>
                    <div class="meta">
                        <span>${escape(m.matchType || 'DirectGame')}</span> &middot;
                        <span>${bestOf}</span> &middot;
                        Source: <span>${src}</span>
                    </div>
                </div>
                <div class="mode-card-actions">
                    <button class="btn btn-secondary" onclick="editMode('${escape(id)}')">Edit</button>
                    <button class="btn btn-danger" onclick="deleteMode('${escape(id)}')">Delete</button>
                </div>
            </div>`;
        }).join('');
    }

    // ===== Form =====
    function newMode() {
        showForm({
            id: '',
            displayName: '',
            description: '',
            matchType: 'DirectGame',
            isBestOf3Default: true,
            legalitySource: { type: 'scryfall', query: '' },
            postProcessing: null,
        }, true);
    }

    function editMode(id) {
        var m = modesCache[id];
        if (!m) return;
        showForm(JSON.parse(JSON.stringify(m)), false);
    }

    async function deleteMode(id) {
        if (!confirm(`Delete "${id}"? This is permanent.`)) return;
        try {
            var res = await fetch(`${FUNCTIONS_URL}/deleteGameMode?env=${ENV}&id=${encodeURIComponent(id)}`, {
                method: 'DELETE',
                headers: { 'X-MTGAES-Auth': authHash },
            });
            if (!res.ok) throw new Error(await res.text());
            toast(`Deleted ${id}`);
            reloadModes();
        } catch (err) {
            toast('Delete failed: ' + err.message, true);
        }
    }

    function showForm(mode, isNew) {
        var ls = mode.legalitySource || { type: 'scryfall', query: '' };
        var pp = mode.postProcessing || {};
        var matchTypeOptions = MATCH_TYPES.map(function(mt) {
            var sel = (mode.matchType === mt.value) ? ' selected' : '';
            return `<option value="${mt.value}"${sel}>${mt.label}</option>`;
        }).join('');

        var html = `
            <div class="form-card">
                <h2>${isNew ? 'New Game Mode' : 'Edit ' + escape(mode.id)}</h2>

                <div class="form-row">
                    <label>ID (slug)</label>
                    <div>
                        <input type="text" id="f-id" value="${escape(mode.id)}" ${isNew ? '' : 'readonly'} placeholder="lowercase, no spaces, e.g. gentry">
                        <div class="help">Lowercase letters, digits, dash and underscore. This becomes the format key in lobbies.</div>
                    </div>
                </div>
                <div class="form-row">
                    <label>Display name</label>
                    <input type="text" id="f-displayName" value="${escape(mode.displayName)}" placeholder="Gentry">
                </div>
                <div class="form-row">
                    <label>Description</label>
                    <textarea id="f-description" placeholder="Short blurb shown in tooltips">${escape(mode.description || '')}</textarea>
                </div>
                <div class="form-row">
                    <label>Match type</label>
                    <div>
                        <select id="f-matchType">${matchTypeOptions}</select>
                        <div class="help">Pick "60 card rebalanced" for Alchemy/rebalanced formats. Most paper-like formats use "Direct Game".</div>
                    </div>
                </div>
                <div class="form-row">
                    <label>Default best-of</label>
                    <div class="checkbox">
                        <input type="checkbox" id="f-bo3" ${mode.isBestOf3Default ? 'checked' : ''}>
                        <label for="f-bo3">Best of 3 (uncheck for Bo1)</label>
                    </div>
                </div>
                <div class="form-row">
                    <label>Discord webhook</label>
                    <div>
                        <input type="text" id="f-discordWebhook" value="${escape(mode.discordWebhookUrl || '')}" placeholder="https://discord.com/api/webhooks/...">
                        <div class="help">Optional. When set, lobbies for this mode also notify this Discord webhook (in addition to the master MTGA+ channel).</div>
                    </div>
                </div>

                <h3 style="color:#fff;margin-top:20px;margin-bottom:10px;">Card legality</h3>
                <div class="tabs">
                    <button class="tab ${ls.type === 'scryfall' ? 'active' : ''}" onclick="switchTab('scryfall')">Scryfall query</button>
                    <button class="tab ${ls.type === 'sqlite' ? 'active' : ''}" onclick="switchTab('sqlite')">MTGA card filter</button>
                </div>

                <div class="tab-pane ${ls.type === 'scryfall' ? 'active' : ''}" id="tab-scryfall">
                    <div class="form-row">
                        <label>Scryfall search</label>
                        <div>
                            <textarea id="f-scryfall-query" placeholder="legal:standard">${escape(ls.type === 'scryfall' ? (ls.query || '') : '')}</textarea>
                            <div class="help">Any valid Scryfall query. Cards matching this set the legal pool. Best for paper-format-based modes.</div>
                        </div>
                    </div>
                </div>

                <div class="tab-pane ${ls.type === 'sqlite' ? 'active' : ''}" id="tab-sqlite">
                    <div class="form-row">
                        <label>Allowed rarities</label>
                        <div id="rarityChips" class="chip-row"></div>
                    </div>
                    <div class="form-row">
                        <label>Allowed sets</label>
                        <div>
                            <input type="text" class="set-search" id="setSearch" placeholder="Search sets..." oninput="filterSets()">
                            <div class="set-list" id="setList"></div>
                            <div class="help">Use this for Arena-only formats (e.g. Historic Pauper). Leaves blank means all sets allowed.</div>
                        </div>
                    </div>
                    <div class="form-row">
                        <label>Excluded card names</label>
                        <textarea id="f-excludeNames" placeholder="One name per line">${escape(((ls.type === 'sqlite' && ls.excludeNames) || []).join('\n'))}</textarea>
                    </div>
                </div>

                <h3 style="color:#fff;margin-top:20px;margin-bottom:10px;">Post-processing rules <span style="font-weight:400;font-size:0.8rem;color:#888;">(optional)</span></h3>
                ${renderPostProcessing(pp)}

                <div class="actions">
                    <button class="btn btn-primary" onclick="saveMode()">Save</button>
                    <button class="btn btn-secondary" onclick="closeForm()">Cancel</button>
                </div>
            </div>
        `;

        var view = document.getElementById('formView');
        view.innerHTML = html;
        view.style.display = 'block';
        view.scrollIntoView({ behavior: 'smooth' });
        renderRarityChips(ls.type === 'sqlite' ? (ls.rarities || []) : []);
        renderSetList(ls.type === 'sqlite' ? (ls.sets || []) : []);
    }

    function renderPostProcessing(pp) {
        var caps = pp.rarityCaps || {};
        var combo = (pp.combinedCaps || [])[0] || null;
        var deckSize = pp.deckSize || {};
        var scope = pp.sideboardScope || 'combined';

        function capRow(rarity) {
            var c = caps[rarity] || {};
            return `<div class="pp-row">
                <label>${rarity}</label>
                <input type="number" min="0" placeholder="max total" id="pp-${rarity}-max" value="${c.maxTotal != null ? c.maxTotal : ''}">
                <input type="number" min="0" placeholder="max per name" id="pp-${rarity}-each" value="${c.maxEach != null ? c.maxEach : ''}">
                <span class="help">Max copies of ${rarity} cards in deck</span>
            </div>`;
        }

        return `<div class="pp-section">
            <h4>Per-rarity caps</h4>
            ${ALL_RARITIES.filter(function(r) { return r !== 'basic'; }).map(capRow).join('')}
        </div>
        <div class="pp-section">
            <h4>Combined rare+mythic cap</h4>
            <div class="pp-row">
                <label>R+M total</label>
                <input type="number" min="0" placeholder="total" id="pp-combo-total" value="${combo && combo.maxTotal != null ? combo.maxTotal : ''}">
                <input type="number" min="0" placeholder="per name" id="pp-combo-each" value="${combo && combo.maxEach != null ? combo.maxEach : ''}">
                <span class="help">Combined cap on rares and mythics together</span>
            </div>
        </div>
        <div class="pp-section">
            <h4>Deck size + sideboard</h4>
            <div class="pp-row">
                <label>Min main</label>
                <input type="number" min="0" id="pp-min" value="${deckSize.min != null ? deckSize.min : 60}">
                <input type="number" min="0" placeholder="max" id="pp-max" value="${deckSize.max != null ? deckSize.max : ''}">
                <span class="help">Main deck size constraints (defaults to 60)</span>
            </div>
            <div class="pp-row">
                <label>Sideboard scope</label>
                <select id="pp-scope" style="grid-column: span 2">
                    <option value="combined" ${scope === 'combined' ? 'selected' : ''}>Combined (main+sideboard counts together)</option>
                    <option value="main" ${scope === 'main' ? 'selected' : ''}>Main only (sideboard exempt)</option>
                    <option value="ignore" ${scope === 'ignore' ? 'selected' : ''}>Ignore sideboard entirely</option>
                </select>
                <span class="help">How rarity caps apply to sideboard cards</span>
            </div>
        </div>`;
    }

    function renderRarityChips(selected) {
        var sel = new Set(selected);
        var html = ALL_RARITIES.map(function(r) {
            var s = sel.has(r) ? 'selected' : '';
            return `<button class="chip ${s}" data-rarity="${r}" onclick="toggleRarity('${r}', this)">${r}</button>`;
        }).join('');
        document.getElementById('rarityChips').innerHTML = html;
    }

    function toggleRarity(rarity, btn) {
        btn.classList.toggle('selected');
    }

    function renderSetList(selected) {
        var sel = new Set(selected);
        var available = setsCache.length > 0 ? setsCache : selected.map(function(s) { return { code: s, count: 0 }; });
        var filtered = available.filter(function(s) {
            return !setSearchTerm || s.code.toLowerCase().includes(setSearchTerm.toLowerCase());
        });
        var html = filtered.map(function(s) {
            var cls = sel.has(s.code) ? 'selected' : '';
            return `<button class="set-toggle ${cls}" data-set="${s.code}" onclick="toggleSet('${s.code}', this)">${s.code}${s.count ? ' <span style="opacity:0.5">'+s.count+'</span>' : ''}</button>`;
        }).join('');
        var note = setsCache.length === 0
            ? '<div class="help" style="margin-bottom:8px;color:#ffa726">Card metadata not loaded. Type set codes manually as a comma-separated list below.</div>'
            : '';
        document.getElementById('setList').innerHTML = note + (html ||
            '<div class="help">No sets match the search.</div>');

        // If no card metadata, render a free-text fallback
        if (setsCache.length === 0) {
            var fallback = '<input type="text" id="f-setsManual" placeholder="MOM, ECL, EOE" value="' + selected.join(', ') + '" style="margin-top:8px;width:100%;padding:8px;border:1px solid #0f3460;border-radius:4px;background:#1a1a2e;color:#c8c8d8">';
            document.getElementById('setList').innerHTML += fallback;
        }
    }

    function toggleSet(code, btn) {
        btn.classList.toggle('selected');
    }

    function filterSets() {
        setSearchTerm = document.getElementById('setSearch').value;
        // Re-render preserving selection
        var selected = Array.from(document.querySelectorAll('.set-toggle.selected'))
            .map(function(b) { return b.dataset.set; });
        renderSetList(selected);
    }

    function switchTab(which) {
        var tabs = document.querySelectorAll('.tab');
        var panes = document.querySelectorAll('.tab-pane');
        tabs.forEach(function(t) { t.classList.remove('active'); });
        panes.forEach(function(p) { p.classList.remove('active'); });
        var idx = which === 'scryfall' ? 0 : 1;
        tabs[idx].classList.add('active');
        document.getElementById('tab-' + which).classList.add('active');
    }

    function closeForm() {
        document.getElementById('formView').style.display = 'none';
    }

    // ===== Save =====
    async function saveMode() {
        var activeTab = document.querySelector('.tab.active').textContent.toLowerCase().includes('scryfall') ? 'scryfall' : 'sqlite';
        var legalitySource;
        if (activeTab === 'scryfall') {
            legalitySource = {
                type: 'scryfall',
                query: document.getElementById('f-scryfall-query').value.trim(),
            };
            if (!legalitySource.query) { toast('Scryfall query is required', true); return; }
        } else {
            var rarities = Array.from(document.querySelectorAll('#rarityChips .chip.selected'))
                .map(function(c) { return c.dataset.rarity; });
            if (rarities.length === 0) { toast('Pick at least one rarity', true); return; }
            var sets = Array.from(document.querySelectorAll('.set-toggle.selected'))
                .map(function(b) { return b.dataset.set; });
            // Manual set fallback
            var manual = document.getElementById('f-setsManual');
            if (manual && manual.value.trim()) {
                sets = manual.value.split(',').map(function(s) { return s.trim().toUpperCase(); }).filter(Boolean);
            }
            var excludeNames = document.getElementById('f-excludeNames').value
                .split('\n').map(function(s) { return s.trim(); }).filter(Boolean);
            legalitySource = { type: 'sqlite', rarities: rarities, sets: sets, excludeNames: excludeNames };
        }

        // Post-processing rules
        var pp = { rarityCaps: {}, combinedCaps: [], deckSize: {}, sideboardScope: document.getElementById('pp-scope').value };
        ['common', 'uncommon', 'rare', 'mythic'].forEach(function(r) {
            var max = numOrNull(document.getElementById('pp-' + r + '-max').value);
            var each = numOrNull(document.getElementById('pp-' + r + '-each').value);
            if (max != null || each != null) pp.rarityCaps[r] = {};
            if (max != null) pp.rarityCaps[r].maxTotal = max;
            if (each != null) pp.rarityCaps[r].maxEach = each;
        });
        var comboTotal = numOrNull(document.getElementById('pp-combo-total').value);
        var comboEach = numOrNull(document.getElementById('pp-combo-each').value);
        if (comboTotal != null || comboEach != null) {
            var combo = { rarities: ['rare', 'mythic'] };
            if (comboTotal != null) combo.maxTotal = comboTotal;
            if (comboEach != null) combo.maxEach = comboEach;
            pp.combinedCaps.push(combo);
        }
        var minSize = numOrNull(document.getElementById('pp-min').value);
        var maxSize = numOrNull(document.getElementById('pp-max').value);
        if (minSize != null) pp.deckSize.min = minSize;
        if (maxSize != null) pp.deckSize.max = maxSize;
        if (Object.keys(pp.rarityCaps).length === 0 && pp.combinedCaps.length === 0 && Object.keys(pp.deckSize).length === 0) {
            pp = null;
        }

        var body = {
            id: document.getElementById('f-id').value.trim().toLowerCase(),
            displayName: document.getElementById('f-displayName').value.trim(),
            description: document.getElementById('f-description').value.trim(),
            matchType: document.getElementById('f-matchType').value,
            isBestOf3Default: document.getElementById('f-bo3').checked,
            discordWebhookUrl: document.getElementById('f-discordWebhook').value.trim(),
            legalitySource: legalitySource,
            postProcessing: pp,
        };

        if (!body.id || !/^[a-z0-9_-]+$/.test(body.id)) { toast('Invalid ID — use lowercase letters, digits, _ and -', true); return; }
        if (!body.displayName) { toast('Display name is required', true); return; }

        // The function does two things in series:
        //   1. validate + write /gameModes/{id}                           (~1s)
        //   2. fetch ~30 pages from Scryfall and write /legalityCache/{id} (5–10 min)
        //
        // We optimistically close the form and tell the user immediately —
        // staring at a spinner for ten minutes is awful. The fetch keeps
        // running on the server (we don't abort), and we surface the
        // eventual result via follow-up toasts if the user is still on the
        // page when it lands. Validation errors come back fast and still get
        // shown via the late-toast path.
        toast(`${body.id} submitted! Legality resolution typically takes 5–10 minutes — refresh the page later to verify it landed.`);
        closeForm();
        reloadModes();

        fetch(`${FUNCTIONS_URL}/createGameMode?env=${ENV}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-MTGAES-Auth': authHash },
            body: JSON.stringify(body),
        }).then(async function (res) {
            var data;
            try { data = await res.json(); } catch (e) { data = {}; }
            if (!res.ok) {
                toast(`${body.id} save failed: ${data.error || `HTTP ${res.status}`}`, true);
                return;
            }
            if (data.legalityWarning) {
                toast(`${body.id} finished, but legality failed: ${data.legalityWarning}`, true);
            } else if (data.totalCards != null) {
                toast(`${body.id} legality finished: ${data.totalCards} cards legal`);
            }
            reloadModes();
        }).catch(function (err) {
            toast(`${body.id} save errored: ${err.message || err}`, true);
        });
    }

    // ===== Helpers =====
    function numOrNull(v) {
        if (v === '' || v == null) return null;
        var n = Number(v);
        return isNaN(n) ? null : n;
    }

    function escape(s) {
        if (s == null) return '';
        return String(s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function toast(msg, isErr) {
        var t = document.createElement('div');
        t.className = 'toast ' + (isErr ? 'error' : 'success');
        t.textContent = msg;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(function() { t.remove(); }, 4000);
    }
</script>

</body>
</html>
