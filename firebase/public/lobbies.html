<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MTGA+ — Lobby Browser</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d1a;
            color: #c8c8d8;
            min-height: 100vh;
        }
        a { color: #e94560; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            height: 56px;
            background: rgba(13, 13, 26, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(233, 69, 96, 0.15);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 28px;
        }
        .header-logo {
            font-size: 1.3rem;
            font-weight: 800;
            color: #e94560;
            letter-spacing: 1px;
        }
        .header-links { display: flex; gap: 20px; }
        .header-links a {
            color: #888;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .header-links a:hover { color: #e0e0e0; text-decoration: none; }
        .header-links a.active { color: #e94560; }
        .username-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .username-bar label {
            font-size: 0.78rem;
            color: #555;
        }
        .username-bar input {
            padding: 5px 10px;
            border: 1px solid #1e1e3a;
            border-radius: 4px;
            background: #14142a;
            color: #c8c8d8;
            font-size: 0.8rem;
            width: 140px;
            min-width: 0;
            flex: 1 1 100px;
            outline: none;
        }
        .username-bar input:focus { border-color: #e94560; }
        .username-bar button {
            padding: 6px 12px;
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #1e1e3a;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .username-bar button:hover { background: #2a2a4a; color: #c8c8d8; }
        .username-bar .saved { color: #4caf50; font-size: 0.75rem; display: none; }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 72px 20px 20px;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .controls .status {
            font-size: 0.9rem;
            color: #888;
        }
        .controls button {
            padding: 8px 16px;
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #1e1e3a;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .controls button:hover { background: #1a4a8a; }

        .filter-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 6px 14px;
            border: 1px solid #1e1e3a;
            border-radius: 16px;
            background: transparent;
            color: #888;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-btn:hover { border-color: #e94560; color: #e0e0e0; }
        .filter-btn.active {
            background: #e94560;
            border-color: #e94560;
            color: white;
        }

        .lobby-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .lobby-row {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            background: #12122a;
            border: 1px solid #1e1e3a;
            border-radius: 8px;
            transition: border-color 0.15s;
        }
        .lobby-row:hover { border-color: #e94560; }
        .lobby-host {
            flex: 2;
            font-size: 1rem;
            font-weight: 600;
            color: white;
        }
        .lobby-format {
            flex: 1.5;
            font-size: 0.9rem;
            color: #4db8ff;
        }
        .lobby-bestof {
            flex: 0.5;
            font-size: 0.85rem;
            color: #888;
            text-align: center;
        }
        .lobby-actions {
            flex: 1;
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }
        .lobby-actions a, .lobby-actions button {
            padding: 7px 14px;
            border-radius: 5px;
            font-size: 0.82rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }
        .btn-join {
            background: #e94560;
            color: white;
        }
        .btn-join:hover { background: #c73e54; }
        .btn-request {
            background: #0f3460;
            color: #e0e0e0;
        }
        .btn-request:hover { background: #1a4a8a; }
        .btn-request.sending { opacity: 0.6; pointer-events: none; }
        .btn-request.sent { background: #2e7d32; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }
        .empty-state h2 { font-size: 1.2rem; margin-bottom: 8px; color: #888; }
        .empty-state p { font-size: 0.9rem; line-height: 1.5; }

        .info-bar {
            margin-top: 24px;
            padding: 14px 18px;
            background: rgba(233, 69, 96, 0.08);
            border: 1px solid rgba(233, 69, 96, 0.2);
            border-radius: 8px;
            font-size: 0.82rem;
            color: #888;
            line-height: 1.5;
            text-align: center;
        }
        .info-bar a { color: #e94560; text-decoration: none; }
        .info-bar a:hover { text-decoration: underline; }

        .header-hamburger { display: none; background: none; border: none; color: #888; font-size: 1.5rem; cursor: pointer; padding: 4px 8px; }
        .header-hamburger:hover { color: #e0e0e0; }

        @media (max-width: 640px) {
            .lobby-row { flex-wrap: wrap; gap: 8px; }
            .lobby-host { flex: 1 1 100%; }
            .lobby-format, .lobby-bestof { flex: 1; }
            .lobby-actions { flex: 1 1 100%; justify-content: flex-start; }
            .header { padding: 0 12px; }
            .header-left { gap: 12px; }
            .header-links, .username-bar { display: none; }
            .header-hamburger { display: block; }
            .header.mobile-open { flex-wrap: wrap; height: auto; padding-bottom: 12px; }
            .header.mobile-open .header-links { display: flex; flex-direction: column; width: 100%; order: 3; padding-top: 8px; gap: 8px; }
            .header.mobile-open .username-bar { display: flex; width: 100%; order: 4; padding-top: 8px; }
            .header.mobile-open .username-bar input { flex: 1 1 0; width: auto; min-width: 0; }
        }
    </style>
</head>
<body>
    <div class="header" id="mainNav">
        <div class="header-left">
            <a href="/" class="header-logo">MTGA+</a>
            <div class="header-links">
                <a href="/lobbies" class="active">Lobbies</a>
                <a href="/gamemodes">Game Modes</a>
                <a href="/changelog">Changelog</a>
                <a href="https://github.com/MayerDaniel/MTGA-Enhancement-Suite" target="_blank">GitHub</a>
                <a href="https://discord.gg/PuPfnb9RrH" target="_blank">Discord</a>
            </div>
        </div>
        <button class="header-hamburger" onclick="document.getElementById('mainNav').classList.toggle('mobile-open')">&#9776;</button>
        <div class="username-bar">
            <label>Username:</label>
            <input type="text" id="savedUsername" placeholder="Name#12345" autocomplete="off">
            <button onclick="saveUsername()">Save</button>
            <span class="saved" id="savedMsg">Saved!</span>
        </div>
    </div>

    <div class="container">
        <div class="controls">
            <span class="status" id="status">Loading...</span>
            <button onclick="refreshLobbies()">Refresh</button>
        </div>

        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" data-action="all" onclick="selectAllFilters()">Select All</button>
            <button class="filter-btn" data-action="none" onclick="selectNoFilters()">Select None</button>
        </div>

        <div class="lobby-list" id="lobbyList"></div>

        <div class="info-bar">
            Install <a href="https://github.com/MayerDaniel/MTGA-Enhancement-Suite" target="_blank">MTGA+</a>
            for direct lobby joining, custom format enforcement, and more.
            Auto-refresh every 15 seconds.
        </div>
    </div>

    <script>
        var FUNCTIONS_URL = 'https://us-central1-mtga-enhancement-suite.cloudfunctions.net';
        var ENV = (new URLSearchParams(window.location.search)).get('env') === 'staging' ? 'staging' : 'prod';
        var allLobbies = [];
        // Multi-select filter: empty Set = show all, otherwise whitelist of format keys.
        var selectedFilters = new Set();
        var refreshTimer = null;

        // --- Username persistence ---
        function loadUsername() {
            var saved = localStorage.getItem('mtgaes_username');
            if (saved) {
                document.getElementById('savedUsername').value = saved;
            }
            return saved || '';
        }

        function saveUsername() {
            var val = document.getElementById('savedUsername').value.trim();
            if (val && /^.+#\d+$/.test(val)) {
                localStorage.setItem('mtgaes_username', val);
                var msg = document.getElementById('savedMsg');
                msg.style.display = 'inline';
                setTimeout(function() { msg.style.display = 'none'; }, 2000);
            } else if (val) {
                alert('Invalid format. Use Name#12345');
            } else {
                localStorage.removeItem('mtgaes_username');
            }
        }

        // Also save on Enter
        document.getElementById('savedUsername').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') saveUsername();
        });

        // --- Format display helpers ---
        var FORMAT_DISPLAY = {
            none: 'No Format',
            pauper: 'Pauper (Paper Banlist)',
            historicpauper: 'Historic Pauper',
            standardpauper: 'Standard Pauper',
            planarstandard: 'Planar Standard',
            modern: 'Modern'
        };

        function formatName(key) {
            return FORMAT_DISPLAY[key] || key.charAt(0).toUpperCase() + key.slice(1);
        }

        // --- Multi-select filter ---
        function toggleFilter(key) {
            if (selectedFilters.has(key)) selectedFilters.delete(key);
            else selectedFilters.add(key);
            buildFilterBar();
            renderLobbies();
        }

        function selectAllFilters() {
            selectedFilters.clear(); // empty = show all
            buildFilterBar();
            renderLobbies();
        }

        function selectNoFilters() {
            // Use a sentinel "__none__" to distinguish "show none" from "show all".
            selectedFilters.clear();
            selectedFilters.add('__none__');
            buildFilterBar();
            renderLobbies();
        }

        function buildFilterBar() {
            var formats = {};
            allLobbies.forEach(function(l) {
                if (l.format && l.format !== 'none') formats[l.format] = true;
            });

            var bar = document.getElementById('filterBar');
            var allActive = selectedFilters.size === 0 ? ' active' : '';
            var noneActive = selectedFilters.has('__none__') ? ' active' : '';
            bar.innerHTML =
                '<button class="filter-btn' + allActive + '" onclick="selectAllFilters()">Select All</button>' +
                '<button class="filter-btn' + noneActive + '" onclick="selectNoFilters()">Select None</button>';

            Object.keys(formats).sort().forEach(function(f) {
                var active = selectedFilters.has(f) ? ' active' : '';
                bar.innerHTML += '<button class="filter-btn' + active +
                    '" data-filter="' + f + '" onclick="toggleFilter(\'' + f + '\')">' +
                    formatName(f) + '</button>';
            });
        }

        function passesFilter(lobby) {
            if (selectedFilters.size === 0) return true;
            if (selectedFilters.has('__none__')) return false;
            return selectedFilters.has(lobby.format);
        }

        // --- Lobby rendering ---
        function renderLobbies() {
            var list = document.getElementById('lobbyList');
            var filtered = allLobbies.filter(passesFilter);

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state">' +
                    '<h2>No lobbies available</h2>' +
                    '<p>No one is hosting right now. Check back soon or create your own lobby in-game!</p>' +
                    '</div>';
                document.getElementById('status').textContent = 'No lobbies found';
                return;
            }

            var savedUser = loadUsername();
            var html = '';

            filtered.forEach(function(lobby) {
                var joinUrl = '/join/' + lobby.id + '/' + (lobby.format || 'none');
                var bestOf = lobby.isBestOf3 ? 'Bo3' : 'Bo1';

                html += '<div class="lobby-row" data-id="' + lobby.id + '">';
                html += '<div class="lobby-host">' + escapeHtml(lobby.host) + '</div>';
                html += '<div class="lobby-format">' + formatName(lobby.format) + '</div>';
                html += '<div class="lobby-bestof">' + bestOf + '</div>';
                html += '<div class="lobby-actions">';
                html += '<a class="btn-join" href="' + joinUrl + '">Join</a>';

                if (savedUser) {
                    html += '<button class="btn-request" onclick="quickJoin(\'' +
                        lobby.id + '\', this)">Quick Join</button>';
                } else {
                    html += '<button class="btn-request" onclick="quickJoin(\'' +
                        lobby.id + '\', this)">Request Invite</button>';
                }

                html += '</div></div>';
            });

            list.innerHTML = html;
            document.getElementById('status').textContent = filtered.length +
                (filtered.length === 1 ? ' lobby' : ' lobbies') + ' available';
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // --- Quick join (request invite with saved username) ---
        function quickJoin(lobbyId, btn) {
            var username = loadUsername();
            if (!username) {
                // No saved username — prompt in the saved username field
                document.getElementById('savedUsername').focus();
                document.getElementById('savedUsername').style.borderColor = '#e94560';
                setTimeout(function() {
                    document.getElementById('savedUsername').style.borderColor = '';
                }, 2000);
                return;
            }

            btn.classList.add('sending');
            btn.textContent = 'Sending...';

            fetch(FUNCTIONS_URL + '/submitJoinRequest?env=' + ENV, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ challengeId: lobbyId, username: username })
            })
            .then(function(resp) { return resp.json().then(function(d) { return { ok: resp.ok, data: d }; }); })
            .then(function(result) {
                btn.classList.remove('sending');
                if (result.ok && result.data.success) {
                    btn.classList.add('sent');
                    btn.textContent = 'Invite Sent!';
                } else {
                    btn.textContent = result.data.error || 'Failed';
                    setTimeout(function() {
                        btn.textContent = username ? 'Quick Join' : 'Request Invite';
                        btn.classList.remove('sent');
                    }, 3000);
                }
            })
            .catch(function() {
                btn.classList.remove('sending');
                btn.textContent = 'Error';
                setTimeout(function() { btn.textContent = username ? 'Quick Join' : 'Request Invite'; }, 3000);
            });
        }

        // --- Fetch lobbies ---
        function refreshLobbies() {
            document.getElementById('status').textContent = 'Loading...';

            fetch(FUNCTIONS_URL + '/listPublicLobbies?env=' + ENV)
            .then(function(resp) { return resp.json(); })
            .then(function(data) {
                allLobbies = data.lobbies || [];
                buildFilterBar();
                renderLobbies();
            })
            .catch(function(err) {
                document.getElementById('status').textContent = 'Failed to load lobbies';
                console.error(err);
            });
        }

        // --- Init ---
        loadUsername();
        refreshLobbies();
        refreshTimer = setInterval(refreshLobbies, 15000);
    </script>
</body>
</html>
