<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MTGA Enhancement Suite</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d1a; color: #c8c8d8; min-height: 100vh; }
    a { color: #e94560; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .nav {
        position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 28px; height: 56px;
        background: rgba(13, 13, 26, 0.92); backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(233, 69, 96, 0.15);
    }
    .nav-left { display: flex; align-items: center; gap: 28px; }
    .nav-logo { font-size: 1.3rem; font-weight: 800; color: #e94560; letter-spacing: 1px; }
    .nav-links { display: flex; gap: 20px; flex-wrap: wrap; }
    .nav-links a { color: #888; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .nav-links a:hover { color: #e0e0e0; text-decoration: none; }
    .center {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        text-align: center; padding: 20px;
    }
    .center h1 { color: #e94560; font-size: 2.2rem; font-weight: 800; margin-bottom: 12px; }
    .center p { color: #888; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-left">
      <a href="/" class="nav-logo">MTGA+</a>
      <div class="nav-links">
        <a href="/lobbies">Lobbies</a>
        <a href="/gamemodes">Game Modes</a>
        <a href="/changelog">Changelog</a>
        <a href="https://github.com/MayerDaniel/MTGA-Enhancement-Suite" target="_blank">GitHub</a>
        <a href="https://discord.gg/PuPfnb9RrH" target="_blank">Discord</a>
      </div>
    </div>
  </nav>
  <div class="center">
    <h1>Page Not Found</h1>
    <p>This invite link may have expired. <a href="/lobbies">Browse open lobbies →</a></p>
  </div>
</body>
</html>
